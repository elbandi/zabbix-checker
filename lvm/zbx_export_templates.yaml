zabbix_export:
  version: '6.0'
  date: '2026-03-29T18:24:06Z'
  groups:
    - uuid: e97cb72ba31f4d61b266e07d8d85301f
      name: 'App templates'
  templates:
    - uuid: 4ef764730bd24121b2b0da083c5548b1
      template: 'Template App LVM active'
      name: 'Template App LVM active'
      description: 'Application template for monitoring Linux Logical Volumen Management (LVM)'
      groups:
        - name: 'App templates'
      items:
        - uuid: 7fb75f175b784433ba11b44a1971be57
          name: 'LVS: Get data'
          key: lvm.lvs
          delay: 15m
          trends: '0'
          value_type: CHAR
          tags:
            - tag: component
              value: raw
        - uuid: cb8aed2db1b54b7a804990151a5ea129
          name: 'PVS: Get data'
          key: lvm.pvs
          delay: 15m
          trends: '0'
          value_type: CHAR
          tags:
            - tag: component
              value: raw
        - uuid: 9e01da8e433f43dbb0de6256409a219b
          name: 'VGS: Get data'
          key: lvm.vgs
          delay: 15m
          trends: '0'
          value_type: CHAR
          tags:
            - tag: component
              value: raw
      discovery_rules:
        - uuid: 7c700b4443704e578ec8b89dd553dedc
          name: 'LVM logical linear volumes discovery'
          type: DEPENDENT
          key: 'lvm.lvs.discovery[linear]'
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#LV_ROLE}'
                value: '^public(,origin.*)?$'
                formulaid: A
              - macro: '{#LV_TYPE}'
                value: ^linear$
                formulaid: B
          lifetime: 7d
          description: 'Low-Level discovery of linear LVM logical volumes (LV)'
          item_prototypes:
            - uuid: 2404e567e2be4227893d2c11f55c86e2
              name: '{#LV_FULL_NAME}: Active state'
              type: DEPENDENT
              key: 'lvm.lvs.value[{#LV_FULL_NAME},lv_active,linear]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              description: 'Active state of an linear LVM logical volume (LV).'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.lv_full_name=="{#LV_FULL_NAME}")].lv_active.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: lvm.lvs
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
              trigger_prototypes:
                - uuid: e7e7a2fb44dd4c72a2f3fffe1eb5ecad
                  expression: 'find(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},lv_active,linear],,"like","active")=0'
                  name: 'LVM linear LV {#LV_FULL_NAME} is not active'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'The linear LVM logical volume is not in state "active", which is most likely a sign of a problem.'
            - uuid: b58e8cc990f7434b9a233c2ccc07e3d8
              name: '{#LV_FULL_NAME}: Size'
              type: DEPENDENT
              key: 'lvm.lvs.value[{#LV_FULL_NAME},lv_size,linear]'
              delay: '0'
              units: B
              description: 'The size of a linear LVM logical volume (LV).'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.lv_full_name=="{#LV_FULL_NAME}")].lv_size.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: lvm.lvs
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
          master_item:
            key: lvm.lvs
          lld_macro_paths:
            - lld_macro: '{#LV_FULL_NAME}'
              path: $.lv_full_name
            - lld_macro: '{#LV_NAME}'
              path: $.lv_name
            - lld_macro: '{#LV_ROLE}'
              path: $.lv_role
            - lld_macro: '{#LV_TYPE}'
              path: $.segtype
        - uuid: adc5443e6e6645919b6423b12510ddcc
          name: 'LVM logical thick snapshot volumes discovery'
          type: DEPENDENT
          key: 'lvm.lvs.discovery[thicksnapshot]'
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#LV_ROLE}'
                value: thicksnapshot
                formulaid: A
          lifetime: '0'
          description: 'Low-Level discovery of a thick provisioned snapshot LVM logical volumes (LV)'
          item_prototypes:
            - uuid: d96a68451146496385fdd44027bffbe6
              name: '{#LV_FULL_NAME}: Active state'
              type: DEPENDENT
              key: 'lvm.lvs.value[{#LV_FULL_NAME},lv_active,thicksnapshot]'
              delay: '0'
              trends: '0'
              value_type: CHAR
              description: 'Active state of a thick provisioned LVM snapshot.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.lv_full_name=="{#LV_FULL_NAME}")].lv_active.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: lvm.lvs
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
