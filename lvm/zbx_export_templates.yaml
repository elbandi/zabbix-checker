                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'The thick provisioned LVM snapshot is not in state "active", which is most likely a sign of a problem.'
            - uuid: 9522c0392ba043bb9a56bd219bdb35b0
              name: '{#LV_FULL_NAME}: Size'
              type: DEPENDENT
              key: 'lvm.lvs.value[{#LV_FULL_NAME},lv_size,thicksnapshot]'
              delay: '0'
              units: B
