              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.lv_full_name=="{#LV_FULL_NAME}")].lv_size.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: lvm.lvs
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
            - uuid: eb83132c0bb9447292724778d5c4de08
              name: '{#LV_FULL_NAME}: Origin'
              type: DEPENDENT
              key: 'lvm.lvs.value[{#LV_FULL_NAME},origin,thicksnapshot]'
              delay: '0'
              history: 7d
              trends: '0'
              value_type: CHAR
              description: 'Origin device of a thick provisioned LVM snapshot.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.lv_full_name=="{#LV_FULL_NAME}")].origin.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: lvm.lvs
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
            - uuid: 48106d33d632454d9df272a15580a1bf
              name: '{#LV_FULL_NAME}: Free snapshot data'
              type: CALCULATED
              key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_free,thicksnapshot]'
              delay: '30'
              units: B
              params: 'last(//lvm.lvs.value[{#LV_FULL_NAME},lv_size,thicksnapshot]) - last(//lvm.lvs.value[{#LV_FULL_NAME},snap_used,thicksnapshot])'
              description: 'The free snapshot data of a thick provisioned LVM snapshot in bytes.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
            - uuid: e8fe1ab06fa344639c2fd016cfc7daf3
              name: '{#LV_FULL_NAME}: Free snapshot data in %'
              type: CALCULATED
              key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_free_percent,thicksnapshot]'
              delay: '30'
              value_type: FLOAT
              params: '100 - last(//lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot])'
              description: 'The percentage of free snapshot data of a thick provisioned LVM snapshot.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
            - uuid: ebb2049c84ed4389aecf2ce40e974fd5
              name: '{#LV_FULL_NAME}: Allocated snapshot data in %'
              type: DEPENDENT
              key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot]'
              delay: '0'
              value_type: FLOAT
              description: 'The percentage of allocated snapshot data of a thick provisioned LVM snapshot in bytes.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.lv_full_name=="{#LV_FULL_NAME}")].snap_percent.first()'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              master_item:
                key: lvm.lvs
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
            - uuid: 0d03ed8a7c504932a846474e07716649
              name: '{#LV_FULL_NAME}: Allocated snapshot data'
              type: CALCULATED
              key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_used,thicksnapshot]'
              delay: '30'
              units: B
              params: 'last(//lvm.lvs.value[{#LV_FULL_NAME},lv_size,thicksnapshot]) / 100 * last(//lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot])'
              description: 'The allocated snapshot data of a thick provisioned LVM snapshot in bytes.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: storage
                - tag: lvm-lv
                  value: '{#LV_FULL_NAME}'
                - tag: lvm-type
                  value: '{#LV_TYPE}'
          trigger_prototypes:
            - uuid: 461b48f2ac3841baa65984a8a1e3b97a
              expression: |
                last(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},snap_free,thicksnapshot]) < {$LVM.LV.SNAPSHOT.FREE.WARN:"{#LV_FULL_NAME}"}
                
                and
                
                last(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot]) < {$LVM.LV.SNAPSHOT.PFREE.WARN:"{#LV_FULL_NAME}"}
              name: 'LVM thick snapshot allocation {HOST.NAME}:[{#LV_FULL_NAME} is high (< $2 %, {ITEM.VALUE1} free)'
              priority: WARNING
              description: 'The free snapshot data of the LVM thick provisioned snapshot is below `{$LVM.LV.SNAPSHOT.FREE.WARN:"{#LV_FULL_NAME}"}` and `{$LVM.LV.SNAPSHOT.PFREE.WARN:"{#LV_FULL_NAME}"}` percent. The snapshot will turn invalid soon.'
              dependencies:
                - name: 'LVM thick snapshot allocation {HOST.NAME}:[{#LV_FULL_NAME} is very high (< $2 %, {ITEM.VALUE1} free)'
                  expression: |
                    last(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},snap_free,thicksnapshot]) < {$LVM.LV.SNAPSHOT.FREE.CRIT:"{#LV_FULL_NAME}"}
                    
                    and
                    
                    last(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot]) < {$LVM.LV.SNAPSHOT.PFREE.CRIT:"{#LV_FULL_NAME}"}
            - uuid: e16264acd1af40318d81d97e99abf8ec
              expression: |
                last(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},snap_free,thicksnapshot]) < {$LVM.LV.SNAPSHOT.FREE.CRIT:"{#LV_FULL_NAME}"}
                
                and
                
                last(/Template App LVM active/lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot]) < {$LVM.LV.SNAPSHOT.PFREE.CRIT:"{#LV_FULL_NAME}"}
              name: 'LVM thick snapshot allocation {HOST.NAME}:[{#LV_FULL_NAME} is very high (< $2 %, {ITEM.VALUE1} free)'
              priority: HIGH
              description: 'The free snapshot data of the LVM thick provisioned snapshot is below `{$LVM.LV.SNAPSHOT.FREE.CRIT:"{#LV_FULL_NAME}"}` and `{$LVM.LV.SNAPSHOT.PFREE.CRIT:"{#LV_FULL_NAME}"}` percent. The snapshot will turn invalid very soon.'
          graph_prototypes:
            - uuid: ca5f43cb451b4597a3de7311b962b2ba
              name: 'LVM usage of thick provisioned snapshot LV {#LV_FULL_NAME}'
              graph_items:
                - color: C80000
                  item:
                    host: 'Template App LVM active'
                    key: 'lvm.lvs.value[{#LV_FULL_NAME},lv_size,thicksnapshot]'
                - sortorder: '1'
                  color: 00C800
                  item:
                    host: 'Template App LVM active'
                    key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_free,thicksnapshot]'
                - sortorder: '2'
                  color: 2774A4
                  item:
                    host: 'Template App LVM active'
                    key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_used,thicksnapshot]'
            - uuid: 68584e25c178437683f77b306e61ee33
              name: 'LVM usage of thick provisioned snapshot LV {#LV_FULL_NAME} in %'
              graph_items:
                - color: 00C800
                  item:
                    host: 'Template App LVM active'
                    key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_free_percent,thicksnapshot]'
                - sortorder: '1'
                  color: 2774A4
                  item:
                    host: 'Template App LVM active'
                    key: 'lvm.lvs.value[{#LV_FULL_NAME},snap_percent,thicksnapshot]'
          master_item:
            key: lvm.lvs
          lld_macro_paths:
            - lld_macro: '{#LV_FULL_NAME}'
              path: $.lv_full_name
            - lld_macro: '{#LV_NAME}'
              path: $.lv_name
            - lld_macro: '{#LV_ROLE}'
              path: $.lv_role
            - lld_macro: '{#LV_TYPE}'
              path: $.segtype
        - uuid: 62c6a52446714226a9631605b8f38f8a
          name: 'LVM logical thin-pool volumes discovery'
          type: DEPENDENT
          key: 'lvm.lvs.discovery[thin-pool]'
          delay: '0'
